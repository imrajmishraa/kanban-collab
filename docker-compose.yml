version: '3.8'

services:
  api:
    build:
      context: ./server
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://db:27017/kanban
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=super_secret_jwt_access_key_2026_kanban!
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_key_2026_kanban!
      - PORT=3000
    depends_on:
      - db
      - cache

  websocket:
    build:
      context: ./server
      dockerfile: ../docker/websocket.Dockerfile
    ports:
      - "1234:1234"
    environment:
      - MONGODB_URI=mongodb://db:27017/kanban
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=super_secret_jwt_access_key_2026_kanban!
      - JWT_REFRESH_SECRET=super_secret_jwt_refresh_key_2026_kanban!
      - WS_PORT=1234
    depends_on:
      - db
      - cache

  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  cache:
    image: redis:7.0
    ports:
      - "6379:6379"

volumes:
  mongo_data:
